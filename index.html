<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Films</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/star-rating.js@4.3.0/dist/star-rating.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/star-rating.js@4.3.0/dist/star-rating.min.js"></script>
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-50">
    <header class="py-8 mb-8 text-center border-b border-slate-800">
      <h1
        class="text-3xl font-bold text-transparent bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text"
      >
        My list
      </h1>
    </header>

    <main
      class="container grid grid-cols-1 gap-8 px-4 pb-12 mx-auto lg:grid-cols-12"
    >
      <section
        class="p-6 border shadow-xl lg:col-span-4 bg-slate-900 rounded-2xl h-fit border-slate-800"
      >
        <h2 class="flex items-center gap-2 mb-4 text-xl font-semibold">
          Buscar Filme
        </h2>
        <div class="flex gap-2 mb-6">
          <input
            class="w-full px-4 py-2 text-sm transition-all border rounded-lg bg-slate-800 border-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            type="text"
            id="searchFilm"
            placeholder="Ex: Interstellar..."
          />
          <button
            id="btnSearch"
            class="px-6 py-2 text-sm font-medium transition-colors bg-indigo-600 rounded-lg cursor-pointer hover:bg-indigo-500"
          >
            Buscar
          </button>
        </div>

        <div id="result" class="flex flex-col gap-4"></div>
      </section>

      <section class="lg:col-span-8">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-bold">Minha Lista</h2>
          <button
            id="btnWatchLater"
            class="flex items-center gap-2 text-sm font-medium text-indigo-400 transition-all cursor-pointer hover:text-indigo-300"
          >
            Atualizar Lista
          </button>
        </div>

        <div
          id="movieSelected"
          class="grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-3"
        ></div>
      </section>
    </main>

    <script src="./src/js/index.js"></script>
  </body>
</html>
